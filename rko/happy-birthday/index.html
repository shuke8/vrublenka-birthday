$(document).ready(function () {
    function insert_get_params() {
        var url1 = (window.location.host + window.location.pathname);
        $('input[name="page_url"]').val(url1);

        var search = location.search,
            params;
        if (search.length > 1) {
            search = search.replace('?', '');
            arSearch = search.split('&');
            for (var i = 0, len = arSearch.length; i < len; i++) {
                params = arSearch[i].split('=');
                if ((params[0] === 'gclid' || params[0] === 'amp;gclid') && params[1] !== undefined) {
                    $('input[name=gclid]').val(params[1]);

                }
                if ((params[0] === 'yclid' || params[0] === 'amp;yclid') && params[1] !== undefined) {
                    $('input[name=gclid]').val(params[1]);
                    continue;
                }
                if ((params[0] === 'referer1' || params[0] === 'amp;referer1') && params[1] !== undefined) {
                    $('input[name=advid]').val(params[1]);
                    continue;
                }
                if ((params[0] === 'sid' || params[0] === 'amp;sid') && params[1] !== undefined) {
                    $('input[name=sid]').val(params[1]);
                    continue;
                }
                if ((params[0] === 'promocode' || params[0] === 'amp;promocode') && params[1] !== undefined) {
                    $('input[name=promocode]').val(params[1]);
                    continue;
                }
            }
        }
    }

    function isCorrectPhone(phone) {
        var isCorrect = true;
        switch (phone) {
            case '+7 (111) 111-1111':
            case '+7 (222) 222-2222':
            case '+7 (333) 333-3333':
            case '+7 (444) 444-4444':
            case '+7 (555) 555-5555':
            case '+7 (666) 666-6666':
            case '+7 (999) 999-9999':
            case '+7 (123) 456-7890':
            case '+7 (911) 111-1111':
            case '+7 (900) 000-0000':
                isCorrect = false;
                break;
        }

        return isCorrect;
    }

    if (window.MutationObserver) {
        const targetNode = $(".tn-atom__form")[0];
        if(!!targetNode) {
            const config = {childList: true, subtree: true};
            const callback = function (mutationsList, observer) {
                insert_get_params();
                observer.disconnect();
            };
    
            const observer = new MutationObserver(callback);
    
            observer.observe(targetNode, config);   
        }
    } else {
        $(".tn-atom__form").bind("DOMSubtreeModified", function () {
            insert_get_params();
        });
    }

    $('body').on('change', 'input[name="phone"]', function () {
        if ($(this).val()) {
            var val = $(this).val();
            var checkPhone = isCorrectPhone(val);
            if (val.slice(4, 5) == "7" || val.slice(4, 5) == "8" || !checkPhone) {
                $(this).val("");
                window.sessionStorage.setItem('phone', "");
                $(this).focus().setCursorPosition(3);
            } else {
                window.sessionStorage.setItem('phone', val);
            }
        }
        insert_get_params();

        window.sessionStorage.setItem('ref_id', $('input[name="ref_id"]').val() ? $('input[name="ref_id"]').val() : '');
        window.sessionStorage.setItem('gclid', $('input[name="gclid"]').val() ? $('input[name="gclid"]').val() : '');
        window.sessionStorage.setItem('yandex_uid', $('input[name="yandex_uid"]').val() ? $('input[name="yandex_uid"]').val() : '');
        window.sessionStorage.setItem('pixel', $('input[name="pixel"]').val() ? $('input[name="pixel"]').val() : '');
        window.sessionStorage.setItem('pixel2', $('input[name="pixel2"]').val() ? $('input[name="pixel2"]').val() : '');
    });

    String.prototype.replaceAt = function (index, replacement) {
        return this.substr(0, index) + replacement + this.substr(index + replacement.length);
    }

    $.fn.setCursorPosition = function (pos) {
        this.each(function (index, elem) {
            if (elem.setSelectionRange) {
                elem.setSelectionRange(pos, pos);
            } else if (elem.createTextRange) {
                var range = elem.createTextRange();
                range.collapse(true);
                range.moveEnd('character', pos);
                range.moveStart('character', pos);
                range.select();
            }
        });
        return this;
    };

    $('body').on('keyup', 'input[name="phone"]', function () {
        if ($(this).val()) {
            var val = $(this).val();
            var checkPhone = isCorrectPhone(val);
            if (val.slice(4, 5) == "7" || val.slice(4, 5) == "8" || !checkPhone) {
                $(this).val("");
                window.sessionStorage.setItem('phone', "");
                $(this).focus().setCursorPosition(3);
                /*} else if (val.slice(4, 5) == "8" && val.slice(5, 6) == "9") {

                    window.sessionStorage.setItem('phone', val);
                    $(this).focus().setCursorPosition(4);*/
            } else {
                window.sessionStorage.setItem('phone', val);
            }
        }
    });

    $('body').on('click', 'input[name="formScreen"]', function () {
        if ($(this).val()) {
            var val = $(this).val();
            if (!!val) {
                if (val === 'Зарегистрировать бизнес и открыть счёт') {
                    window.sessionStorage.setItem('docUploadLink', '/qes/doc/');
                } else if (val = 'Счёт ИП/ООО') {
                    window.sessionStorage.setItem('docUploadLink', '/doc/');
                }
            }
        }
    });

    var storagePhone = window.sessionStorage.getItem('phone');
    var storageRefId = window.sessionStorage.getItem('ref_id');
    var storageYandexUid = window.sessionStorage.getItem('yandex_uid');
    var storageCrmType = window.sessionStorage.getItem('docUploadLink');
    if (storagePhone) {
        var tochkaUrl = 'https://tochka.com'
        var docHref = 'https://tochka.com/doc/';
        var $docLink = $('a[href="' + docHref + '"]');
        if (typeof $docLink[0] === 'undefined') {
            docHref = 'https://tochka.com/qes/doc/';

        }
        if (!!storageCrmType) {

    }

    $(function () {
        setTimeout(function () {
            $('input[name=yandex_uid]').val(yaCounter28039770.getClientID());
        }, 3000);
    });

    var el = document.querySelector(cls);
    if (!el) return null;

};

    return Math.max(a, Math.min(b, v));

    for (let i = arr.length - 1; i > 0; i--) {

    [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
};

};

U.showElem = function (el) {

    el.style.opacity = "1";

};

U.showRecordById = function (id) {

// Функция для проверки, прошел ли ДР
B.isBirthdayPassed = function () {
    var search = window.location.search;
    if (!search || search.length < 2) return false;
    
    var dateStr = search.substring(1).split("&")[0];
    var parts = dateStr.split("-");
    if (parts.length !== 2) return false;
    
    var day = parseInt(parts[0], 10);
    var month = parseInt(parts[1], 10);
    if (isNaN(day) || isNaN(month)) return false;
    
    var today = new Date();
    var todayYear = today.getFullYear();
    var todayMonth = today.getMonth() + 1;
    var todayDay = today.getDate();
    
    // Проверяем, совпадает ли сегодняшняя дата с ДР
    var isTodayBirthday = todayMonth === month && todayDay === day;
    if (isTodayBirthday) return false; // Сегодня ДР
    
    // Если сегодня не ДР, проверяем, прошел ли он
    var birthdayThisYear = new Date(todayYear, month - 1, day, 0, 0, 0, 0);
    var todayStart = new Date(todayYear, todayMonth - 1, todayDay, 0, 0, 0, 0);
    
    // Если текущий месяц меньше месяца ДР (например, январь < декабрь),
    // значит ДР был в прошлом году и уже прошел
    // ИЛИ если ДР в текущем году уже прошел (но не сегодня)
    return (todayMonth < month || todayStart > birthdayThisYear);
};

B.applyDateLogicToTitle = function () {
    var titleAtom = B.el.titleAtom;
    if (!titleAtom) return;
    
    var texts = B.getTexts();
    var isPassed = B.isBirthdayPassed();
    
    if (isPassed) {
        // ДР прошел
        U.setHTML(titleAtom, texts.BELATED_TITLE);
        if (B.el.descAtom) {
            U.setHTML(B.el.descAtom, texts.BELATED_DESC);
        }
        
        // Заменяем изображения тортов
        B.replaceCakeImages(true);
    } else {
        // ДР сегодня или без даты
        U.setHTML(titleAtom, texts.BIRTHDAY_DEFAULT);
        if (B.el.descAtom) {
            U.setHTML(B.el.descAtom, texts.BIRTHDAY_DEFAULT_DESC);
        }
        
        // Используем обычные изображения тортов
        B.replaceCakeImages(false);
    }
};

B.replaceCakeImages = function (isPassed) {

    if (B.el.cakeImageEl) {
        var img = B.el.cakeImageEl.querySelector('img');
        if (img) {
            if (isPassed) {
                // ДР прошел - используем новое изображение
                img.src = '../../rko/images/tild6363-3937-4164-b632-653933383262__cake_1.svg';
                img.setAttribute('data-original', '../../rko/images/tild6363-3937-4164-b632-653933383262__cake_1.svg');
            } else {
                // ДР сегодня - используем оригинальное изображение

            }
        }
    }
    
    // Заменяем изображение в .ccake2
    if (B.el.cake2ImageEl) {

            if (isPassed) {

    if (candEl) {

            // ДР сегодня - показываем

    if (B.el.decor2Els && B.el.decor2Els.length > 0) {
        B.el.decor2Els.forEach(function(decor2El) {

                // ДР прошел - показываем второй декор
                decor2El.style.display = '';
            } else {
                // ДР сегодня - скрываем второй декор
                decor2El.style.display = 'none';

B.startConfetti = function () {
    var group = B.el.confettiGroup;
    if (!group) return;
    
    group.style.display = "block";
    
    var w = window.innerWidth || 1920;
    var fallY = 2700; // desktop default
    
    if (w <= 640) {
    fallY = 1800; // phone
    } else if (w <= 1440) {
    fallY = 1640; // tablet
    }
    
    group.style.willChange = "transform";
    group.style.transform = "translate3d(0, 0, 0)";
    
    requestAnimationFrame(function () {
    group.style.transition = "transform 3000ms linear";
    group.style.transform = "translate3d(0," + fallY + "px,0)";
    });
    
    var DURATION = B.CONFETTI_DURATION;
    var MAX_DY = 200;
    var MAX_DX = 180;
    var MAX_ROT = 180;
    var EASING = "ease-in-out";
    
    function rand(min, max) {
    return min + Math.random() * (max - min);
    }
    
    function animateOne(el) {
    el.style.willChange = "transform";
    
    var dx1 = rand(-MAX_DX, MAX_DX) * 0.7;
    var dy1 = rand(-MAX_DY * 0.3, MAX_DY * 0.3);
    var r1 = rand(-MAX_ROT * 0.5, MAX_ROT * 0.5);
    
    var dx2 = rand(-MAX_DX, MAX_DX);
    var dy2 = rand(MAX_DY * 0.5, MAX_DY * 1.2);
    var r2 = rand(-MAX_ROT, MAX_ROT);
    
    var delay = rand(0, 300);
    var dur = DURATION + rand(-300, 400);
    
    try {
        el.animate(
        [
            { transform: "translate3d(0,0,0) rotate(0deg)" },
            { transform: "translate3d(" + dx1.toFixed(1) + "px," + dy1.toFixed(1) + "px,0) rotate(" + r1.toFixed(1) + "deg)" },
            { transform: "translate3d(" + dx2.toFixed(1) + "px," + dy2.toFixed(1) + "px,0) rotate(" + r2.toFixed(1) + "deg)" }
        ],
        { duration: dur, delay: delay, easing: EASING, fill: "forwards" }
        );
    } catch (e) {}
    }
    
    var items = Array.prototype.slice.call(group.querySelectorAll(".tn-elem"));
    items.forEach(animateOne);
};

B.initFlameAnimations = function () {

    return;
    }
    
    var flames = B.el.flames || [];
    if (!flames.length) return;

    '../../external/gist.githubusercontent.com/Egaliy/841e4fe1cfc380e83e361a128c0c2275/raw/a3c17279a1fa63c654bf299409ad1639e4057777/2.json?v=1775191064',
    '../../external/gist.githubusercontent.com/Egaliy/0d432d4d82700d9d5bc0bae4f7b88813/raw/fe966a4b6678474d6982f2e2fb7c3cf7cb9db62a/1.json?v=1775191064'

    flames.forEach(function (flameEl) {

    clickTrigger.style.top = '50%';
    clickTrigger.style.transform = 'translate(-50%, calc(-50% + 30px))'; // Сдвигаем на 30px вниз
    clickTrigger.style.pointerEvents = 'auto';
    clickTrigger.style.cursor = 'pointer';
    clickTrigger.style.zIndex = '100'; // Поверх всего
    clickTrigger.style.backgroundColor = 'transparent'; // Прозрачный, но кликабельный
    
    // Привязываем обработчик клика к триггеру
    function handleFlameClick(e) {
        e.stopPropagation();
        
        if (!S.manualMode || S.blown) return;
        
        if (flameEl.getAttribute("data-out") === "1") return;
        
        flameEl.setAttribute("data-out", "1");
        flameEl.style.transformOrigin = "50% 100%";
        flameEl.style.opacity = "0";
        
        // Отключаем pointer-events для триггера, когда пламя затухло
        clickTrigger.style.pointerEvents = 'none';
        
        // На мобильных устройствах уменьшаем смещение в 1.5 раза
        var windowWidth = window.innerWidth || 1920;
        var translateY = windowWidth <= B.MOBILE_BREAKPOINT ? 40 : 60;
        flameEl.style.transform = "translateY(" + translateY + "px) scale(0.2)";
        
        for (var i = 0; i < S.flameSchedule.length; i++) {
            if (S.flameSchedule[i].el === flameEl) {
            S.flameSchedule[i].done = true;
            break;
            }
        }
        
        var flames = B.el.flames || [];
        setTimeout(function () {
            var allOut = true;
            for (var j = 0; j < flames.length; j++) {
            // Проверяем только видимые пламена (не скрытые через display: none)
            var isVisible = flames[j].offsetParent !== null || 
                           window.getComputedStyle(flames[j]).display !== 'none';
            
            if (isVisible && flames[j].getAttribute("data-out") !== "1") {
                allOut = false;
                break;
            }
            }
            if (allOut) blowOut();
        }, 380);
    }
    clickTrigger.addEventListener('click', handleFlameClick);
    clickTrigger.addEventListener('touchstart', function(e) { e.preventDefault(); handleFlameClick(e); });
    
    // Добавляем триггер внутрь flameEl
    flameEl.appendChild(clickTrigger);
    
    // Mobile: touch on flame simulates click on trigger
    flameEl.addEventListener('touchend', function(e) {
        e.preventDefault();
        clickTrigger.style.pointerEvents = 'auto';
        clickTrigger.click();
    }, {passive: false});
    
    // Находим контейнер с изображением
    var atom = flameEl.querySelector('.tn-atom');
    if (!atom) return;
    
    // Удаляем изображение
    var img = atom.querySelector('img');
    if (img) img.remove();
    
    // Убеждаемся, что атом имеет position: relative для позиционирования
    atom.style.position = 'relative';
    
    // Создаем контейнер для Lottie размером 200x200px, центрируем через absolute positioning
    // На мобильных устройствах (<= 420px) уменьшаем в 1.5 раза
    var windowWidth = window.innerWidth || 1920;
    var lottieSize = windowWidth <= 440 ? (200 / 1.5) : 200;
    
    // Создаем внешний контейнер для визуального отображения
    var lottieContainer = document.createElement('div');
    lottieContainer.style.width = lottieSize + 'px';
    lottieContainer.style.height = lottieSize + 'px';
    lottieContainer.style.position = 'absolute';
    lottieContainer.style.left = '50%';
    lottieContainer.style.top = '50%';
    lottieContainer.style.transform = 'translate(-48%, -30%)'; // Сдвигаем на 60px ниже
    // Контейнер Lottie неинтерактивен - клики обрабатываются отдельным триггером
    lottieContainer.style.pointerEvents = 'none';
    atom.appendChild(lottieContainer);
    
    // Случайно выбираем анимацию
    var randomAnimationUrl = flameAnimations[Math.floor(Math.random() * flameAnimations.length)];
    
    // Случайно выбираем начальный кадр (в секундах, от 0 до 1 секунды)
    var randomStartTime = Math.random();
    
    // Функция для установки начального кадра и запуска
    function startAnimation(animation) {
        if (!animation || !animation.totalFrames) return;
        var totalFrames = animation.totalFrames;
        var randomStartFrame = Math.floor(randomStartTime * totalFrames);
        animation.goToAndPlay(randomStartFrame, true);
    }
    
    // Загружаем и инициализируем анимацию
    var anim = lottie.loadAnimation({
        container: lottieContainer,
        renderer: 'svg',
        loop: true,
        autoplay: false,
        path: randomAnimationUrl
    });
    
    // Устанавливаем начальный кадр после загрузки данных
    anim.addEventListener('data_ready', function () {
        startAnimation(anim);
    });
    
    // Также пробуем запустить сразу (на случай если уже загружено)
    setTimeout(function () {
        if (anim && anim.totalFrames) {
        startAnimation(anim);
        }
    }, 100);
    });
};

// ==================== ОСНОВНАЯ ЛОГИКА ====================
B.VOLUME_FLOOR = 0.02;
B.ENERGY_GAIN = 7.0;
B.TARGET_ENERGY = 0.30;
B.DONE_RECORD_ID = "rec1718368121";

function initFlamesSchedule(targetEnergy) {
    S.flameSchedule = [];
    S.flamesReady = false;
    
    var flames = B.el.flames || [];
    var FLAME_COUNT = flames.length;
    if (!FLAME_COUNT) return;
    
    var OVERLAP = 0.55;
    var MIN_DURATION = 0.18;
    var MAX_DURATION = 0.42;
    
    var order = U.shuffle(flames.map((el, idx) => ({ el, idx })));
    var step = targetEnergy / Math.max(1, FLAME_COUNT - 1);
    
    for (var i = 0; i < order.length; i++) {
    var baseStart = step * i;
    var jitter = (Math.random() - 0.5) * step * 0.55;
    var overlapShift = step * OVERLAP * Math.random();
    
    var startE = Math.max(0, baseStart + jitter - overlapShift);
    var dur = MIN_DURATION + Math.random() * (MAX_DURATION - MIN_DURATION);
    var endE = startE + dur;
    
    S.flameSchedule.push({
        el: order[i].el,
        startE: startE,
        endE: endE,
        done: false,
    });
    
    order[i].el.style.transformOrigin = "50% 100%"; // Уменьшаем к низу (центр по горизонтали, низ по вертикали)
    order[i].el.style.willChange = "transform, opacity";
    }
    
    var maxEnd = Math.max.apply(
    null,
    S.flameSchedule.map(function (f) {
        return f.endE;
    })
    );
    
    if (maxEnd > targetEnergy) {
    var k = targetEnergy / maxEnd;
    S.flameSchedule.forEach(function (f) {
        f.startE *= k;
        f.endE *= k;
    });
    }
    
    S.flamesReady = true;
}

function updateFlamesByEnergy(currentEnergy) {
    if (!S.flamesReady) return;
    
    for (var i = 0; i < S.flameSchedule.length; i++) {
    var f = S.flameSchedule[i];
    var p = (currentEnergy - f.startE) / (f.endE - f.startE);
    p = U.clamp(p, 0, 1);
    
    var scale = 1 - p;
    scale = Math.max(0.05, scale);
    
    var wobble = 1 - p * (0.08 + Math.random() * 0.02);
    
    // Смещаем вниз при уменьшении, чтобы свечи "уходили" к низу
    var baseTranslateY = 60;
    // На мобильных устройствах уменьшаем в 1.5 раза
    var windowWidth = window.innerWidth || 1920;
    if (windowWidth <= B.MOBILE_BREAKPOINT) {
        baseTranslateY = baseTranslateY / 1.5;
    }
    var translateY = p * baseTranslateY;
    
    f.el.style.transform = "translateY(" + translateY.toFixed(1) + "px) scale(" + (scale * wobble).toFixed(3) + ")";
    f.el.style.opacity = (1 - p).toFixed(3); // Уменьшаем opacity до 0
    
    if (p >= 1 && !f.done) f.done = true;
    }
}

function allFlamesOut() {
    if (!S.flamesReady) return false;
    for (var i = 0; i < S.flameSchedule.length; i++) {
    if (!S.flameSchedule[i].done) return false;
    }
    return true;
}

function cancelPermissionTimer() {

function enableFlameClickToExtinguish() {
    var flames = B.el.flames || [];
    if (!flames.length) return;
    
    flames.forEach(function (fl) {
    fl.style.transition = "transform 350ms ease, opacity 350ms ease, filter 350ms ease";

    });
    
    function onFlameClick(e) {
    if (!S.manualMode || S.blown) return;

    // Получаем элемент пламени - это currentTarget (элемент, на который привязан обработчик)
    var flameEl = e.currentTarget;
    if (!flameEl) return;
    
    if (flameEl.getAttribute("data-out") === "1") return;
    
    flameEl.setAttribute("data-out", "1");
    flameEl.style.transformOrigin = "50% 100%"; // Уменьшаем к низу (центр по горизонтали, низ по вертикали)
    flameEl.style.opacity = "0";
    // На мобильных устройствах уменьшаем смещение в 1.5 раза
    var windowWidth = window.innerWidth || 1920;
    var translateY = windowWidth <= B.MOBILE_BREAKPOINT ? 40 : 60; // 60 / 1.5 = 40
    flameEl.style.transform = "translateY(" + translateY + "px) scale(0.2)"; // Смещаем вниз при уменьшении
    
    for (var i = 0; i < S.flameSchedule.length; i++) {
        if (S.flameSchedule[i].el === flameEl) {
        S.flameSchedule[i].done = true;
        break;
        }
    }
    
    setTimeout(function () {
        var allOut = true;
        for (var j = 0; j < flames.length; j++) {
        // Проверяем только видимые пламена (не скрытые через display: none)
        var isVisible = flames[j].offsetParent !== null || 
                       window.getComputedStyle(flames[j]).display !== 'none';
        
        if (isVisible && flames[j].getAttribute("data-out") !== "1") {
            allOut = false;
            break;
        }
        }
        if (allOut) blowOut();
    }, 380);
    }
    
    // Привязываем клики к элементам пламени
    flames.forEach(function (fl) {
    if (fl.getAttribute("data-manual-bound") === "1") return;
    fl.setAttribute("data-manual-bound", "1");
    fl.addEventListener("click", onFlameClick);
    });
}

function enableManualMode() {
    if (S.blown) return;
    S.manualMode = true;
    B.hideNoMicBtn();
    manualTexts();
    enableFlameClickToExtinguish();
    B.liftCake();
}

async function startMicFlow() {
    if (S.started || S.blown) return;
    S.started = true;
    
    B.hideNoMicBtn();
    
    initFlamesSchedule(B.TARGET_ENERGY);
    
    cancelPermissionTimer();
    S.permissionTimeoutId = setTimeout(function () {
    if (!S.blown && S.started && !S.manualMode) B.showNoMicBtn();
    }, 5000);
    
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    cancelPermissionTimer();
    B.showNoMicBtn();
    enableManualMode();
    S.started = false;
    return;
    }
    
    try {
    S.micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    } catch (e) {
    cancelPermissionTimer();
    // В Safari не показываем кнопку, если пользователь отклонил доступ
    // Просто переключаемся в ручной режим
    enableManualMode();
    S.started = false;
    return;
    }
    
    cancelPermissionTimer();
    B.hideNoMicBtn();
    
    // Показываем текст "Выдыхайте — сегодня ваш день" после получения доступа к микрофону
    startMicTexts();
    
    S.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    if (S.audioContext.state === "suspended") {
    try {
        await S.audioContext.resume();
    } catch (e) {}
    }
    
    S.analyser = S.audioContext.createAnalyser();
    S.analyser.fftSize = 512;
    
    var source = S.audioContext.createMediaStreamSource(S.micStream);
    source.connect(S.analyser);
    
    S.dataArray = new Uint8Array(S.analyser.fftSize);
    S.energy = 0;
    S.smoothVol = 0;
    S.lastTime = performance.now();
    
    B.liftCake();
    loop();
}

function loop() {
    if (!S.analyser || S.blown || S.manualMode) return;
    
    S.analyser.getByteTimeDomainData(S.dataArray);
    
    var sum = 0;
    for (var i = 0; i < S.dataArray.length; i++) {
    var v = S.dataArray[i] - 128;
    sum += v * v;
    }
    
    var rms = Math.sqrt(sum / S.dataArray.length);
    var vol = rms / 128;
    
    S.smoothVol = 0.85 * S.smoothVol + (1 - 0.85) * vol;
    
    var now = performance.now();
    var dt = Math.max(0, (now - S.lastTime) / 1000);
    S.lastTime = now;
    
    var effective = Math.max(0, S.smoothVol - B.VOLUME_FLOOR);
    S.energy += effective * dt * B.ENERGY_GAIN;
    
    updateFlamesByEnergy(S.energy);
    
    if (S.energy >= B.TARGET_ENERGY || allFlamesOut()) {
    blowOut();
    return;
    }
    
    S.rafId = requestAnimationFrame(loop);
}

function blowOut() {
    if (S.blown) return;
    S.blown = true;
    
    B.hideNoMicBtn();
    cancelPermissionTimer();
    
    U.hideElem(B.el.titleElem);
    U.hideElem(B.el.descElem);
    
    B.startConfetti();
    
    setTimeout(function () {
    doneTexts();
    B.setFinalTitle100();
    B.prepareFinalFadeIn();
    B.runFinalFadeIn();
    B.revealPresentsStaggered();
